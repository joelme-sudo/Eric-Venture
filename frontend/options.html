<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options – ERIC VENTURE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0A0B0D;
            --bg-secondary: #141519;
            --bg-card: #1C1D22;
            --text-primary: #FFFFFF;
            --accent: #F0B90B;
            --border: #2B2D33;
        }
        body { background: var(--bg-primary); color: var(--text-primary); }
        .main-nav { background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #F0B90B, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .options-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            text-align: center;
        }
        .coming-soon {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 4rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <nav class="main-nav">[same navigation as spot.html]</nav>
    
    <div class="options-container">
        <div class="coming-soon">
            <h1>Options Trading</h1>
            <p style="color: var(--text-secondary); margin-top:1rem;">Coming Soon</p>
        </div>
    </div>
</body>
</html>
