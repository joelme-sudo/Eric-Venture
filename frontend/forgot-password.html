<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – ERIC VENTURE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --bg-primary: #0A0B0D;
            --bg-secondary: #141519;
            --bg-card: #1C1D22;
            --text-primary: #FFFFFF;
            --text-secondary: #8A8D92;
            --accent: #F0B90B;
            --green: #0ECB81;
            --border: #2B2D33;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forgot-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        .forgot-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 2.5rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F0B90B, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        p {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            color: var(--text-primary);
        }
        .reset-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-card">
            <div class="logo">EVER FINANCE</div>
            <h1>Reset Password</h1>
            <p>Enter your email to receive reset instructions</p>
            
            <input type="email" class="input-group" placeholder="Email" id="email">
            <button class="reset-btn" onclick="resetPassword()">Send Reset Link</button>
            
            <div class="back-link">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        async function resetPassword() {
            const email = document.getElementById('email').value;
            // Call backend endpoint
            alert('Reset link sent! Check your email.');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
