<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Eric Venture</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --bg-primary: #0A0B0D;
            --bg-secondary: #141519;
            --bg-card: #1C1D22;
            --text-primary: #FFFFFF;
            --text-secondary: #8A8D92;
            --accent: #F0B90B;
            --green: #0ECB81;
            --border: #2B2D33;
        }
        body { background: var(--bg-primary); color: var(--text-primary); padding: 1rem; }
        .dashboard { max-width: 1200px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #F0B90B, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-card {
            background: linear-gradient(135deg, #1E1F23, #25262A);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .balance-amount { font-size: 2rem; font-weight: 700; }
        .quick-actions { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .action-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .currency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .currency-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
        }
        .ai-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .ai-input { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .ai-input input {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: white;
        }
        .ai-input button {
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            border: none;
            border-radius: 0.5rem;
            color: black;
            font-weight: 600;
            cursor: pointer;
        }
        .ai-response { margin-top: 0.5rem; padding: 0.75rem; background: var(--bg-secondary); border-radius: 0.5rem; }
        .transactions { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; }
        .tx-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
        .logout-btn { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.5rem 1rem; cursor: pointer; }
        @media (max-width: 768px) { .currency-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="top-bar">
            <div class="logo">ERIC VENTURE</div>
            <div class="logout-btn" onclick="logout()">Logout</div>
        </div>

        <div class="balance-card">
            <div style="color: var(--text-secondary);">Total Portfolio</div>
            <div class="balance-amount" id="totalBalance">$0.00</div>
        </div>

        <div class="quick-actions">
            <div class="action-btn" onclick="alert('Deposit demo')"><i class="fas fa-plus"></i> Deposit</div>
            <div class="action-btn" onclick="alert('Withdraw demo')"><i class="fas fa-minus"></i> Withdraw</div>
            <div class="action-btn" onclick="window.location='convert.html'"><i class="fas fa-exchange-alt"></i> Convert</div>
            <div class="action-btn" onclick="window.location='spot.html'"><i class="fas fa-chart-line"></i> Trade</div>
        </div>

        <div class="currency-grid" id="currencyGrid"></div>

        <div class="ai-section">
            <h3>AI Assistant</h3>
            <div class="ai-input">
                <input type="text" id="aiCommand" placeholder="e.g., deposit 100 USD">
                <button onclick="sendCommand()">Send</button>
            </div>
            <div class="ai-response" id="aiResponse">Ready...</div>
        </div>

        <div class="transactions">
            <h3>Recent Transactions</h3>
            <div id="txList">Loading...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://eric-venture-api.onrender.com';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        async function fetchData() {
            try {
                const balanceRes = await fetch(`${API_URL}/api/user/balance`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const balance = await balanceRes.json();
                document.getElementById('totalBalance').textContent = `$${balance.totalUSD?.toFixed(2) || '0.00'}`;
                
                const grid = document.getElementById('currencyGrid');
                grid.innerHTML = `
                    <div class="currency-card"><div>₿ Bitcoin</div><div>${balance.btc?.toFixed(4) || '0'} BTC</div></div>
                    <div class="currency-card"><div>Ξ Ethereum</div><div>${balance.eth?.toFixed(4) || '0'} ETH</div></div>
                    <div class="currency-card"><div>₮ Tether</div><div>${balance.usdt?.toFixed(2) || '0'} USDT</div></div>
                `;
                
                const txRes = await fetch(`${API_URL}/api/user/transactions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const txs = await txRes.json();
                const txList = document.getElementById('txList');
                if (txs.length === 0) {
                    txList.innerHTML = 'No transactions';
                } else {
                    txList.innerHTML = txs.slice(0,5).map(tx => `
                        <div class="tx-item">
                            <span>${tx.type} ${tx.amount} ${tx.currency}</span>
                            <span>${new Date(tx.created_at).toLocaleDateString()}</span>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        async function sendCommand() {
            const command = document.getElementById('aiCommand').value;
            if (!command) return;
            const responseDiv = document.getElementById('aiResponse');
            responseDiv.textContent = 'Processing...';
            try {
                const res = await fetch(`${API_URL}/api/user/command`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ command })
                });
                const data = await res.json();
                responseDiv.textContent = data.success ? `✅ ${data.message}` : `❌ ${data.message}`;
                if (data.success) fetchData();
            } catch (err) {
                responseDiv.textContent = '❌ Connection error';
            }
            document.getElementById('aiCommand').value = '';
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        fetchData();
    </script>
</body>
</html>
