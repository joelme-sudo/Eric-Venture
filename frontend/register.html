<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Eric Venture</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --bg-primary: #0A0B0D;
            --bg-secondary: #141519;
            --bg-card: #1C1D22;
            --text-primary: #FFFFFF;
            --text-secondary: #8A8D92;
            --accent: #F0B90B;
            --green: #0ECB81;
            --red: #F6465D;
            --border: #2B2D33;
        }
        body { background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
        .main-nav {
            background: rgba(10,11,13,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #F0B90B, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .register-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .register-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; width: 100%; max-width: 450px; }
        h2 { margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 1rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 0.75rem; color: var(--text-primary); font-size: 1rem; }
        input:focus { outline: none; border-color: var(--accent); }
        .requirements { margin: 1rem 0; font-size: 0.8rem; }
        .requirement { color: var(--text-secondary); margin: 0.25rem 0; }
        .requirement.met { color: var(--green); }
        .terms { margin: 1rem 0; display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); }
        button { width: 100%; padding: 1rem; background: var(--accent); color: black; border: none; border-radius: 0.75rem; font-weight: 600; cursor: pointer; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(240,185,11,0.3); }
        .error { color: var(--red); text-align: center; margin-top: 1rem; }
        .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--text-secondary); }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .social-login { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .social-btn { background: var(--bg-secondary); border: 1px solid var(--border); padding: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; cursor: pointer; }
        .login-link { text-align: center; margin-top: 1.5rem; color: var(--text-secondary); }
        .login-link a { color: var(--accent); text-decoration: none; }
        @media (max-width: 480px) { .register-card { padding: 1.5rem; } .social-login { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="logo">ERIC VENTURE</div>
        <a href="login.html" style="color: var(--text-primary); text-decoration: none;">Log In</a>
    </nav>

    <div class="register-container">
        <div class="register-card">
            <h2>Create Account</h2>
            <div class="subtitle">Start your crypto journey</div>

            <div class="input-group"><input type="text" id="fullName" placeholder="Full Name"></div>
            <div class="input-group"><input type="email" id="email" placeholder="Email"></div>
            <div class="input-group"><input type="password" id="password" placeholder="Password"></div>

            <div class="requirements" id="requirements">
                <div class="requirement" id="req-length">❌ At least 8 characters</div>
                <div class="requirement" id="req-lower">❌ Lowercase letter</div>
                <div class="requirement" id="req-upper">❌ Uppercase letter</div>
                <div class="requirement" id="req-number">❌ Number</div>
                <div class="requirement" id="req-special">❌ Special character</div>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms">
                <label>I agree to the <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a></label>
            </div>

            <button onclick="register()" id="registerBtn">Create Account</button>
            <div id="error" class="error"></div>

            <div class="divider">or sign up with</div>
            <div class="social-login">
                <button class="social-btn" onclick="alert('Coming soon')"><i class="fab fa-google"></i> Google</button>
                <button class="social-btn" onclick="alert('Coming soon')"><i class="fab fa-apple"></i> Apple</button>
            </div>

            <div class="login-link">Already have an account? <a href="login.html">Log in</a></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://eric-venture-api.onrender.com';

        function checkStrength() {
            const pwd = document.getElementById('password').value;
            const reqs = {
                length: pwd.length >= 8,
                lower: /[a-z]/.test(pwd),
                upper: /[A-Z]/.test(pwd),
                number: /[0-9]/.test(pwd),
                special: /[!@#$%^&*(),.?":{}|<>]/.test(pwd)
            };
            ['length', 'lower', 'upper', 'number', 'special'].forEach(id => {
                const el = document.getElementById(`req-${id}`);
                if (reqs[id]) {
                    el.innerHTML = `✅ ${el.innerHTML.substring(2)}`;
                    el.classList.add('met');
                } else {
                    el.innerHTML = `❌ ${el.innerHTML.substring(2)}`;
                    el.classList.remove('met');
                }
            });
        }

        async function register() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const terms = document.getElementById('terms').checked;
            const btn = document.getElementById('registerBtn');
            
            if (!fullName || !email || !password) {
                document.getElementById('error').textContent = 'All fields required';
                return;
            }
            if (!terms) {
                document.getElementById('error').textContent = 'Accept terms';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Creating...';
            document.getElementById('error').textContent = '';
            
            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name: fullName })
                });
                const data = await res.json();
                
                if (res.ok) {
                    const loginRes = await fetch(`${API_URL}/api/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const loginData = await loginRes.json();
                    if (loginData.token) {
                        localStorage.setItem('token', loginData.token);
                        window.location.href = 'customer-dashboard.html';
                    } else {
                        window.location.href = 'login.html';
                    }
                } else {
                    document.getElementById('error').textContent = data.error || 'Registration failed';
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            } catch (err) {
                document.getElementById('error').textContent = 'Connection error. Try again.';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        document.getElementById('password').addEventListener('input', checkStrength);
        checkStrength();
    </script>
</body>
</html>
