<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Eric Venture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --bg-primary: #0A0B0D;
            --bg-secondary: #141519;
            --bg-card: #1C1D22;
            --text-primary: #FFFFFF;
            --text-secondary: #8A8D92;
            --accent: #F0B90B;
            --red: #F6465D;
            --border: #2B2D33;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        .admin-badge {
            background: var(--accent);
            color: black;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F0B90B, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        h2 { margin-bottom: 0.5rem; }
        .input-group { margin-bottom: 1rem; }
        input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-primary);
        }
        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .error { color: var(--red); text-align: center; margin-top: 1rem; }
        .back-link { text-align: center; margin-top: 1rem; }
        .back-link a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="admin-badge">🔐 ADMIN</div>
        <div class="logo">ERIC VENTURE</div>
        <h2>Admin Login</h2>
        <div class="input-group"><input type="email" id="email" placeholder="Admin Email" value="breakthrougheric981@gmail.com"></div>
        <div class="input-group"><input type="password" id="password" placeholder="Password" value="Rejoice12"></div>
        <button onclick="adminLogin()">Access Admin Panel</button>
        <div id="error" class="error"></div>
        <div class="back-link"><a href="../landing.html">← Back to Main Site</a></div>
    </div>

    <script>
        const API_URL = 'https://eric-venture-api.onrender.com';

        async function adminLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            document.getElementById('error').textContent = '';
            
            try {
                const res = await fetch(`${API_URL}/api/auth/admin-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.token && data.isAdmin) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('error').textContent = data.error || 'Invalid admin credentials';
                }
            } catch (err) {
                document.getElementById('error').textContent = 'Connection error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Access Admin Panel';
            }
        }
    </script>
</body>
</html>
