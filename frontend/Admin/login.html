<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Ever Finance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        :root {
            --bg-primary: #0a0b0e;
            --bg-secondary: #1a1b1e;
            --bg-card: #1e1f22;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --accent: #f0b90b;
            --accent-hover: #ffd700;
            --border: #2a2b2e;
            --error: #ef4444;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .admin-badge {
            background: var(--accent);
            color: black;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0b90b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(240, 185, 11, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            border: none;
            border-radius: 0.75rem;
            color: black;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin: 1rem 0;
        }

        button:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(240, 185, 11, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            color: var(--error);
            text-align: center;
            min-height: 1.5rem;
            margin: 0.5rem 0;
        }

        .back-link {
            text-align: center;
        }

        .back-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            border-top-color: black;
            animation: spin 0.8s linear infinite;
            margin-left: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="admin-badge">🔐 ADMIN ACCESS</div>
            <div class="logo">EVER FINANCE</div>
            <h2>Admin Login</h2>
            <div class="subtitle">Secure access to admin panel</div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" value="breakthrougheric981@gmail.com" placeholder="admin@ever.finance">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" value="Rejoice12" placeholder="••••••••">
            </div>

            <button onclick="login()" id="loginBtn">
                <span>Access Admin Panel</span>
            </button>

            <div id="error" class="error"></div>

            <div class="back-link">
                <a href="../landing.html">← Back to Main Site</a>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('error');
            
            // Clear previous error
            errorDiv.textContent = '';
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter both email and password';
                return;
            }
            
            // Show loading state
            btn.disabled = true;
            btn.innerHTML = '<span>Logging in...</span><span class="spinner"></span>';
            
            try {
                console.log('Sending login request...');
                
                const response = await fetch('http://localhost:5001/api/auth/admin-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok && data.token) {
                    // Save token
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.user));
                    
                    console.log('Login successful, redirecting...');
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    btn.disabled = false;
                    btn.innerHTML = '<span>Access Admin Panel</span>';
                }
            } catch (err) {
                console.error('Login error:', err);
                errorDiv.textContent = 'Cannot connect to server. Make sure backend is running on port 5001.';
                btn.disabled = false;
                btn.innerHTML = '<span>Access Admin Panel</span>';
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
