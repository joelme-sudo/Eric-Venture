<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – Eric Venture</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --bg-primary: #0A0B0D;
            --bg-secondary: #141519;
            --bg-card: #1C1D22;
            --text-primary: #FFFFFF;
            --text-secondary: #8A8D92;
            --accent: #F0B90B;
            --border: #2B2D33;
        }
        body { background: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            height: 100vh;
            position: fixed;
        }
        .sidebar-logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #F0B90B, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2rem; }
        .sidebar-link {
            display: block;
            padding: 0.75rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .sidebar-link:hover, .sidebar-link.active { background: var(--accent); color: black; }
        .main-content { flex: 1; margin-left: 260px; padding: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .table-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); }
        th { color: var(--text-secondary); }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">ERIC VENTURE</div>
        <a href="index.html" class="sidebar-link active">Dashboard</a>
        <a href="users.html" class="sidebar-link">Users</a>
        <a href="transactions.html" class="sidebar-link">Transactions</a>
        <a href="#" onclick="logout()" class="sidebar-link">Logout</a>
    </div>
    <div class="main-content">
        <h1>Dashboard</h1>
        <div class="stats-grid" id="stats">
            <div class="stat-card"><div>Total Users</div><div class="stat-value" id="totalUsers">-</div></div>
            <div class="stat-card"><div>24h Volume</div><div class="stat-value" id="totalVolume">-</div></div>
            <div class="stat-card"><div>Transactions</div><div class="stat-value" id="transactions">-</div></div>
            <div class="stat-card"><div>Pending KYC</div><div class="stat-value" id="pendingKYC">-</div></div>
        </div>
        <div class="table-section">
            <h3>Recent Users</h3>
            <table id="usersTable">
                <thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Status</th></tr></thead>
                <tbody><tr><td colspan="4">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
    <script>
        const API_URL = 'https://eric-venture-api.onrender.com';
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'login.html';

        async function fetchAdminData() {
            try {
                const [usersRes] = await Promise.all([
                    fetch(`${API_URL}/api/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                const users = await usersRes.json();
                document.getElementById('totalUsers').textContent = users.length;
                document.getElementById('totalVolume').textContent = '$7.6B';
                document.getElementById('transactions').textContent = '1,234,567';
                document.getElementById('pendingKYC').textContent = users.filter(u => u.kyc_status === 'pending').length;
                const tableBody = document.querySelector('#usersTable tbody');
                tableBody.innerHTML = users.slice(0,5).map(u => `
                    <tr><td>${u.full_name || 'N/A'}</td><td>${u.email}</td><td>${new Date(u.created_at).toLocaleDateString()}</td><td>${u.kyc_status}</td></tr>
                `).join('');
            } catch (err) { console.error(err); }
        }
        function logout() { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
        fetchAdminData();
    </script>
</body>
</html>
