<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Eric Venture</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0A0B0D;
            color: white;
            padding: 16px;
        }
        .navbar {
            background: rgba(10,11,13,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #2B2D33;
            position: sticky;
            top: 0;
            padding: 12px 16px;
            margin: -16px -16px 16px -16px;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F0B90B, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .nav-links a {
            color: #8A8D92;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .logout-btn {
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 8px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.8rem;
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 12px;
            padding: 12px;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #8A8D92;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #F0B90B;
        }
        .two-col {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .card {
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 12px;
            padding: 12px;
        }
        .pair-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #F0B90B;
        }
        .timeframes {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .timeframe {
            padding: 4px 10px;
            background: #141519;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .timeframe.active {
            background: #F0B90B;
            color: black;
        }
        #priceChart {
            height: 160px;
            width: 100%;
            margin-top: 8px;
        }
        .trade-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .trade-tab {
            flex: 1;
            text-align: center;
            padding: 6px;
            background: #141519;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .trade-tab.active {
            background: #F0B90B;
            color: black;
        }
        .input-group {
            margin-bottom: 10px;
        }
        .input-group label {
            font-size: 0.7rem;
            color: #8A8D92;
            display: block;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 8px;
            background: #141519;
            border: 1px solid #2B2D33;
            border-radius: 8px;
            color: white;
            font-size: 0.8rem;
        }
        .trade-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .buy-btn {
            background: #0ECB81;
            color: black;
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .sell-btn {
            background: #F6465D;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .market-table {
            width: 100%;
            font-size: 0.75rem;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .market-table th, .market-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #2B2D33;
        }
        .market-table th {
            color: #8A8D92;
            font-weight: 500;
        }
        .positive { color: #0ECB81; }
        .negative { color: #F6465D; }
        .ai-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .ai-input input {
            flex: 1;
            padding: 8px;
            background: #141519;
            border: 1px solid #2B2D33;
            border-radius: 8px;
            color: white;
        }
        .ai-input button {
            padding: 8px 16px;
            background: #F0B90B;
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: 600;
            cursor: pointer;
        }
        .ai-response {
            margin-top: 8px;
            padding: 8px;
            background: #141519;
            border-radius: 8px;
            font-size: 0.75rem;
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .two-col {
                grid-template-columns: 1fr;
            }
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <div class="logo">ERIC VENTURE</div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="market-spot.html">Markets</a>
                <a href="convert.html">Convert</a>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Balance</div><div class="stat-value" id="totalBalance">$0.00</div></div>
        <div class="stat-card"><div class="stat-label">BTC</div><div class="stat-value" id="btcBalance">0.0000</div></div>
        <div class="stat-card"><div class="stat-label">ETH</div><div class="stat-value" id="ethBalance">0.0000</div></div>
        <div class="stat-card"><div class="stat-label">USDT</div><div class="stat-value" id="usdtBalance">0.00</div></div>
    </div>

    <div class="two-col">
        <div class="card">
            <div><span style="font-size:0.8rem;">BTC/USDT</span><div class="pair-price" id="btcPrice">$0.00</div></div>
            <div class="timeframes">
                <span class="timeframe active" data-interval="1">1H</span>
                <span class="timeframe" data-interval="24">1D</span>
                <span class="timeframe" data-interval="168">1W</span>
            </div>
            <canvas id="priceChart"></canvas>
        </div>

        <div class="card">
            <div class="trade-tabs"><span class="trade-tab active">Limit</span><span class="trade-tab">Market</span></div>
            <div class="input-group"><label>Price (USDT)</label><input type="number" id="tradePrice" placeholder="0.00"></div>
            <div class="input-group"><label>Amount (BTC)</label><input type="number" id="tradeAmount" placeholder="0.00"></div>
            <div class="input-group"><label>Total</label><input type="text" id="tradeTotal" readonly placeholder="0.00 USDT"></div>
            <div class="trade-buttons"><button class="buy-btn" onclick="placeOrder('buy')">Buy</button><button class="sell-btn" onclick="placeOrder('sell')">Sell</button></div>
        </div>
    </div>

    <div class="card">
        <h3 style="font-size:0.9rem;">Market Prices</h3>
        <table class="market-table"><thead><tr><th>Coin</th><th>Price</th><th>24h</th><th>Action</th></tr></thead><tbody id="marketData"><tr><td colspan="4">Loading...</td></tr></tbody></table>
    </div>

    <div class="card">
        <h3 style="font-size:0.9rem;">🤖 AI Assistant</h3>
        <div class="ai-input"><input type="text" id="aiCommand" placeholder="deposit 100 USD, balance"><button onclick="sendAICommand()">Send</button></div>
        <div class="ai-response" id="aiResponse">Ready...</div>
    </div>

    <script>
        const API_URL = 'https://eric-venture.onrender.com';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        let priceChart;

        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(30).fill(''), datasets: [{ data: [65000,66000,67000,68000,67500,68500,69000,68000,67000,68500], borderColor: '#F0B90B', borderWidth: 2, fill: false, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#2B2D33' } }, x: { display: false } } }
            });
        }

        async function fetchBTCPrice() {
            try {
                const res = await fetch(`${API_URL}/api/market/price/BTCUSDT`);
                const data = await res.json();
                document.getElementById('btcPrice').innerText = `$${data.price?.toLocaleString() || '68,142'}`;
                document.getElementById('tradePrice').value = data.price || 68142;
            } catch(e) { console.log(e); }
        }

        async function fetchBalances() {
            try {
                const res = await fetch(`${API_URL}/api/user/balance`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                document.getElementById('totalBalance').innerText = `$${data.totalUSD?.toFixed(2) || '0.00'}`;
            } catch(e) { console.log(e); }
        }

        async function fetchMarketData() {
            try {
                const res = await fetch(`${API_URL}/api/market/all`);
                const data = await res.json();
                document.getElementById('marketData').innerHTML = data.slice(0,5).map(c => `<tr><td><strong>${c.symbol}</strong></td><td>$${c.price?.toLocaleString() || '0'}</td><td class="${c.change >= 0 ? 'positive' : 'negative'}">${c.change >= 0 ? '+' : ''}${c.change?.toFixed(1) || '0'}%</td><td><button style="background:#F0B90B;border:none;padding:4px 12px;border-radius:6px;cursor:pointer;" onclick="alert('Trade ${c.symbol}')">Trade</button></td></tr>`).join('');
            } catch(e) { console.log(e); }
        }

        function updateTotal() {
            const price = parseFloat(document.getElementById('tradePrice').value) || 0;
            const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
            document.getElementById('tradeTotal').value = (price * amount).toFixed(2) + ' USDT';
        }

        function placeOrder(type) {
            const amount = document.getElementById('tradeAmount').value;
            if (!amount || amount <= 0) { alert('Enter amount'); return; }
            alert(`${type.toUpperCase()} order: ${amount} BTC`);
        }

        async function sendAICommand() {
            const cmd = document.getElementById('aiCommand').value;
            if (!cmd) return;
            const resp = document.getElementById('aiResponse');
            resp.innerText = 'Processing...';
            try {
                const res = await fetch(`${API_URL}/api/user/command`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ command: cmd }) });
                const data = await res.json();
                resp.innerText = data.success ? `✅ ${data.message}` : `❌ ${data.message}`;
                if (data.success) fetchBalances();
            } catch(e) { resp.innerText = '❌ Error'; }
            document.getElementById('aiCommand').value = '';
        }

        document.getElementById('tradePrice').addEventListener('input', updateTotal);
        document.getElementById('tradeAmount').addEventListener('input', updateTotal);

        function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

        fetchBTCPrice();
        fetchBalances();
        fetchMarketData();
        initChart();
    </script>
</body>
</html>
