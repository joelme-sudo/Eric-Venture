<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Eric Venture</title>
    <!-- TradingView Widget -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0A0B0D;
            color: white;
            padding: 16px;
        }
        .navbar {
            background: rgba(10,11,13,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #2B2D33;
            position: sticky;
            top: 0;
            padding: 12px 16px;
            margin: -16px -16px 16px -16px;
            z-index: 100;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F0B90B, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .nav-links a {
            color: #8A8D92;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .logout-btn {
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 8px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.8rem;
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 12px;
            padding: 12px;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #8A8D92;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #F0B90B;
        }
        .two-col {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        .card {
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 12px;
            padding: 16px;
        }
        .price-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .pair-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #F0B90B;
        }
        .pair-change {
            font-size: 0.9rem;
        }
        .pair-change.up { color: #0ECB81; }
        .pair-change.down { color: #F6465D; }
        .tradingview-widget {
            width: 100%;
            height: 450px;
            margin-top: 10px;
        }
        .trade-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .trade-tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: #141519;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .trade-tab.active {
            background: #F0B90B;
            color: black;
        }
        .input-group {
            margin-bottom: 12px;
        }
        .input-group label {
            font-size: 0.75rem;
            color: #8A8D92;
            display: block;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            background: #141519;
            border: 1px solid #2B2D33;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
        }
        .trade-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }
        .buy-btn {
            background: #0ECB81;
            color: black;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .sell-btn {
            background: #F6465D;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .market-table {
            width: 100%;
            font-size: 0.8rem;
            border-collapse: collapse;
        }
        .market-table th, .market-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #2B2D33;
        }
        .market-table th {
            color: #8A8D92;
            font-weight: 500;
        }
        .positive { color: #0ECB81; }
        .negative { color: #F6465D; }
        .trade-btn {
            background: #F0B90B;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .ai-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .ai-input input {
            flex: 1;
            padding: 10px;
            background: #141519;
            border: 1px solid #2B2D33;
            border-radius: 8px;
            color: white;
        }
        .ai-input button {
            padding: 10px 20px;
            background: #F0B90B;
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: 600;
            cursor: pointer;
        }
        .ai-response {
            margin-top: 10px;
            padding: 10px;
            background: #141519;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .two-col { grid-template-columns: 1fr; }
            .nav-links { display: none; }
            .tradingview-widget { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="wallets.html">Wallets</a>
    <a href="market-spot.html">Markets</a>
    <a href="convert.html">Convert</a>
</div>
    <div class="navbar">
        <div class="nav-container">
            <div class="logo">ERIC VENTURE</div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="market-spot.html">Markets</a>
                <a href="convert.html">Convert</a>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Balance</div><div class="stat-value" id="totalBalance">$0.00</div></div>
        <div class="stat-card"><div class="stat-label">BTC</div><div class="stat-value" id="btcBalance">0.0000</div></div>
        <div class="stat-card"><div class="stat-label">ETH</div><div class="stat-value" id="ethBalance">0.0000</div></div>
        <div class="stat-card"><div class="stat-label">USDT</div><div class="stat-value" id="usdtBalance">0.00</div></div>
    </div>

    <div class="two-col">
        <div class="card">
            <div class="price-header">
                <div>
                    <span style="font-size:0.9rem;">BTC/USDT</span>
                    <span class="pair-price" id="btcPrice">$0.00</span>
                    <span class="pair-change" id="btcChange"></span>
                </div>
                <div class="timeframes" style="display: flex; gap: 5px;">
                    <span class="timeframe" onclick="changeSymbol('BTC')">BTC</span>
                    <span class="timeframe" onclick="changeSymbol('ETH')">ETH</span>
                    <span class="timeframe" onclick="changeSymbol('BNB')">BNB</span>
                    <span class="timeframe" onclick="changeSymbol('SOL')">SOL</span>
                </div>
            </div>
            <div id="tradingview-widget" class="tradingview-widget"></div>
        </div>

        <div class="card">
            <div class="trade-tabs"><span class="trade-tab active">Limit</span><span class="trade-tab">Market</span></div>
            <div class="input-group"><label>Price (USDT)</label><input type="number" id="tradePrice" placeholder="0.00"></div>
            <div class="input-group"><label>Amount (BTC)</label><input type="number" id="tradeAmount" placeholder="0.00"></div>
            <div class="input-group"><label>Total</label><input type="text" id="tradeTotal" readonly placeholder="0.00 USDT"></div>
            <div class="trade-buttons"><button class="buy-btn" onclick="placeOrder('buy')">Buy</button><button class="sell-btn" onclick="placeOrder('sell')">Sell</button></div>
        </div>
    </div>

    <div class="card">
        <h3 style="font-size:1rem; margin-bottom:8px;">Market Prices</h3>
        <table class="market-table"><thead><tr><th>Coin</th><th>Price</th><th>24h</th><th></th></tr></thead><tbody id="marketData"><tr><td colspan="4">Loading...<\/td><\/tr><\/tbody><\/table>
    <\/div>

    <div class="card">
        <h3 style="font-size:1rem; margin-bottom:8px;">🤖 AI Assistant<\/h3>
        <div class="ai-input"><input type="text" id="aiCommand" placeholder="Type a command... e.g., deposit 100 USD, show balance"><button onclick="sendAICommand()">Send<\/button><\/div>
        <div class="ai-response" id="aiResponse">Ready. Try "deposit 100 USD" or "balance"<\/div>
    <\/div>

    <script>
        const API_URL = 'https:\/\/eric-venture.onrender.com';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        let tvWidget = null;
        let currentSymbol = 'BTC';

        // Initialize TradingView Chart
        function initTradingView(symbol) {
            if (tvWidget !== null) {
                tvWidget.remove();
            }
            tvWidget = new TradingView.widget({
                "container_id": "tradingview-widget",
                "width": "100%",
                "height": 450,
                "symbol": `BINANCE:${symbol}USDT`,
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "studies": [
                    "MASimple@tv-basicstudies",
                    "RSI@tv-basicstudies"
                ]
            });
        }

        function changeSymbol(symbol) {
            currentSymbol = symbol;
            initTradingView(symbol);
            fetchPrice(symbol);
        }

        async function fetchPrice(symbol) {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}USDT`);
                const data = await res.json();
                const price = parseFloat(data.lastPrice).toLocaleString();
                const change = parseFloat(data.priceChangePercent).toFixed(2);
                const changeClass = change >= 0 ? 'up' : 'down';
                document.getElementById('btcPrice').innerHTML = `$${price}`;
                document.getElementById('btcChange').innerHTML = `${change >= 0 ? '+' : ''}${change}%`;
                document.getElementById('btcChange').className = `pair-change ${changeClass}`;
                document.getElementById('tradePrice').value = data.lastPrice;
            } catch(e) { console.log(e); }
        }

        async function fetchBalances() {
            try {
                const res = await fetch(`${API_URL}/api/user/balance`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const data = await res.json();
                document.getElementById('totalBalance').innerHTML = `$${data.totalUSD?.toFixed(2) || '0.00'}`;
            } catch(e) { console.log(e); }
        }

        async function fetchMarketData() {
            try {
                const res = await fetch(`${API_URL}/api/market/all`);
                const data = await res.json();
                document.getElementById('marketData').innerHTML = data.slice(0,6).map(c => `
                    <tr onclick="changeSymbol('${c.symbol}')">
                        <td><strong>${c.symbol}</strong> ${c.name}<\/td>
                        <td>$${c.price?.toLocaleString() || '0'}<\/td>
                        <td class="${c.change >= 0 ? 'positive' : 'negative'}">${c.change >= 0 ? '+' : ''}${c.change?.toFixed(1) || '0'}%<\/td>
                        <td><button class="trade-btn">Trade<\/button><\/td>
                    <\/tr>
                `).join('');
            } catch(e) { console.log(e); }
        }

        function updateTotal() {
            const price = parseFloat(document.getElementById('tradePrice').value) || 0;
            const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
            document.getElementById('tradeTotal').value = (price * amount).toFixed(2) + ' USDT';
        }

        function placeOrder(type) {
            const amount = document.getElementById('tradeAmount').value;
            if (!amount || amount <= 0) { alert('Enter amount'); return; }
            alert(`${type.toUpperCase()} order: ${amount} ${currentSymbol} at $${document.getElementById('tradePrice').value}`);
        }

        async function sendAICommand() {
            const cmd = document.getElementById('aiCommand').value;
            if (!cmd) return;
            const resp = document.getElementById('aiResponse');
            resp.innerText = 'Processing...';
            try {
                const res = await fetch(`${API_URL}/api/user/command`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
                    body: JSON.stringify({ command: cmd }) 
                });
                const data = await res.json();
                resp.innerText = data.success ? `✅ ${data.message}` : `❌ ${data.message}`;
                if (data.success) fetchBalances();
            } catch(e) { resp.innerText = '❌ Connection error'; }
            document.getElementById('aiCommand').value = '';
        }

        document.getElementById('tradePrice').addEventListener('input', updateTotal);
        document.getElementById('tradeAmount').addEventListener('input', updateTotal);

        function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

        // Initialize
        initTradingView('BTC');
        fetchPrice('BTC');
        fetchBalances();
        fetchMarketData();
        updateTotal();
    </script>
</body>
</html>
