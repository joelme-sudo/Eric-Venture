<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard – Eric Venture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0A0B0E;
            color: #FFFFFF;
            padding: 16px;
        }
        
        /* Navbar */
        .navbar {
            background: rgba(10,11,14,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 0;
            padding: 10px 20px;
            margin: -16px -16px 16px -16px;
            z-index: 100;
        }
        .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F0B90B, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #8A8D92;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .nav-links a.active, .nav-links a:hover { color: #F0B90B; }
        .logout-btn {
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 20px;
            padding: 5px 14px;
            cursor: pointer;
            font-size: 0.7rem;
            color: white;
        }
        
        /* Trading Layout - MetaTrader 5 Style */
        .trading-container {
            display: flex;
            gap: 16px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* Left Panel - Market Watch */
        .market-panel {
            width: 260px;
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .panel-header {
            padding: 12px 16px;
            background: #141519;
            border-bottom: 1px solid #2B2D33;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .market-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid #2B2D33;
            cursor: pointer;
            transition: background 0.2s;
        }
        .market-item:hover {
            background: #2B2D33;
        }
        .market-item.active {
            background: rgba(240,185,11,0.15);
            border-left: 3px solid #F0B90B;
        }
        .market-symbol {
            font-weight: 500;
            font-size: 0.85rem;
        }
        .market-price {
            font-size: 0.85rem;
            font-weight: 500;
        }
        .market-price.up { color: #0ECB81; }
        .market-price.down { color: #F6465D; }
        
        /* Center Panel - Chart */
        .chart-panel {
            flex: 1;
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 12px;
            padding: 16px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .current-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #F0B90B;
        }
        .current-change {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .current-change.up { background: rgba(14,203,129,0.15); color: #0ECB81; }
        .current-change.down { background: rgba(246,70,93,0.15); color: #F6465D; }
        .timeframes {
            display: flex;
            gap: 6px;
            background: #141519;
            padding: 4px;
            border-radius: 30px;
        }
        .timeframe {
            background: transparent;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: #8A8D92;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .timeframe.active {
            background: #F0B90B;
            color: black;
        }
        .tradingview-widget {
            width: 100%;
            height: 380px;
        }
        
        /* Right Panel - Trading */
        .trading-panel {
            width: 320px;
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 12px;
            padding: 16px;
            flex-shrink: 0;
        }
        .order-type {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .order-btn {
            flex: 1;
            background: #141519;
            border: 1px solid #2B2D33;
            padding: 8px;
            border-radius: 8px;
            color: #8A8D92;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .order-btn.active {
            background: #F0B90B;
            color: black;
            border-color: #F0B90B;
        }
        .input-group {
            margin-bottom: 14px;
        }
        .input-group label {
            display: block;
            font-size: 0.7rem;
            color: #8A8D92;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            background: #141519;
            border: 1px solid #2B2D33;
            border-radius: 8px;
            color: white;
            font-size: 0.85rem;
        }
        .trade-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .buy-action {
            background: #0ECB81;
            color: black;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .sell-action {
            background: #F6465D;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .position-info {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #2B2D33;
        }
        .position-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.75rem;
        }
        .position-label {
            color: #8A8D92;
        }
        
        /* Bottom Panel - Orders & Positions */
        .bottom-panel {
            margin-top: 16px;
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 12px;
            overflow: hidden;
        }
        .bottom-tabs {
            display: flex;
            background: #141519;
            border-bottom: 1px solid #2B2D33;
        }
        .bottom-tab {
            padding: 10px 20px;
            font-size: 0.8rem;
            color: #8A8D92;
            cursor: pointer;
        }
        .bottom-tab.active {
            color: #F0B90B;
            border-bottom: 2px solid #F0B90B;
        }
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .orders-table th, .orders-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #2B2D33;
        }
        .orders-table th {
            color: #8A8D92;
            font-weight: 500;
        }
        .positive { color: #0ECB81; }
        .negative { color: #F6465D; }
        
        /* Mobile */
        @media (max-width: 1024px) {
            .trading-container {
                flex-direction: column;
            }
            .market-panel {
                width: 100%;
                order: 2;
            }
            .chart-panel {
                order: 1;
            }
            .trading-panel {
                width: 100%;
                order: 3;
            }
            .market-items {
                display: flex;
                overflow-x: auto;
            }
            .market-item {
                min-width: 100px;
            }
        }
        
        @media (max-width: 768px) {
            body { padding: 12px; }
            .nav-links { display: none; }
            .tradingview-widget { height: 250px; }
            .current-price { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <div class="logo">ERIC VENTURE</div>
            <div class="nav-links">
                <a href="dashboard.html" class="active">Trade</a>
                <a href="wallets.html">Wallets</a>
                <a href="market-spot.html">Markets</a>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="trading-container">
        <!-- Left Panel - Market Watch -->
        <div class="market-panel">
            <div class="panel-header">Market Watch</div>
            <div class="market-items" id="marketList"></div>
        </div>

        <!-- Center Panel - Chart -->
        <div class="chart-panel">
            <div class="chart-header">
                <div>
                    <span style="font-size:0.8rem; color:#8A8D92;" id="currentSymbol">BTC/USDT</span>
                    <div class="current-price" id="currentPrice">$0.00</div>
                    <div class="current-change" id="currentChange"></div>
                </div>
                <div class="timeframes">
                    <button class="timeframe" data-interval="1">1m</button>
                    <button class="timeframe" data-interval="5">5m</button>
                    <button class="timeframe active" data-interval="15">15m</button>
                    <button class="timeframe" data-interval="60">1h</button>
                    <button class="timeframe" data-interval="240">4h</button>
                    <button class="timeframe" data-interval="1440">1d</button>
                </div>
            </div>
            <div id="tradingview-widget" class="tradingview-widget"></div>
        </div>

        <!-- Right Panel - Trading -->
        <div class="trading-panel">
            <div class="order-type">
                <button class="order-btn active" onclick="setOrderType('limit')">Limit</button>
                <button class="order-btn" onclick="setOrderType('market')">Market</button>
                <button class="order-btn" onclick="setOrderType('stop')">Stop</button>
            </div>
            <div id="limitOrder">
                <div class="input-group"><label>Price (USDT)</label><input type="number" id="limitPrice" placeholder="0.00"></div>
                <div class="input-group"><label>Amount (BTC)</label><input type="number" id="limitAmount" placeholder="0.00"></div>
            </div>
            <div id="marketOrder" style="display:none;">
                <div class="input-group"><label>Amount (BTC)</label><input type="number" id="marketAmount" placeholder="0.00"></div>
            </div>
            <div id="stopOrder" style="display:none;">
                <div class="input-group"><label>Stop Price (USDT)</label><input type="number" id="stopPrice" placeholder="0.00"></div>
                <div class="input-group"><label>Limit Price (USDT)</label><input type="number" id="stopLimitPrice" placeholder="0.00"></div>
                <div class="input-group"><label>Amount (BTC)</label><input type="number" id="stopAmount" placeholder="0.00"></div>
            </div>
            <div class="trade-actions">
                <button class="buy-action" onclick="placeOrder('buy')">BUY</button>
                <button class="sell-action" onclick="placeOrder('sell')">SELL</button>
            </div>
            <div class="position-info">
                <div class="position-row"><span class="position-label">Balance</span><span id="balance">$0.00</span></div>
                <div class="position-row"><span class="position-label">Free Margin</span><span id="freeMargin">$0.00</span></div>
                <div class="position-row"><span class="position-label">Margin Level</span><span id="marginLevel">0%</span></div>
            </div>
        </div>
    </div>

    <!-- Bottom Panel - Orders & Positions -->
    <div class="bottom-panel">
        <div class="bottom-tabs">
            <div class="bottom-tab active" onclick="showTab('positions')">Positions</div>
            <div class="bottom-tab" onclick="showTab('orders')">Open Orders</div>
            <div class="bottom-tab" onclick="showTab('history')">History</div>
        </div>
        <div id="positionsTab">
            <table class="orders-table">
                <thead><tr><th>Symbol</th><th>Side</th><th>Size</th><th>Entry Price</th><th>Current Price</th><th>PnL</th><th>Actions</th></tr></thead>
                <tbody id="positionsList"><tr><td colspan="7" style="text-align:center;">No open positions</td></tr></tbody>
            </table>
        </div>
        <div id="ordersTab" style="display:none;">
            <table class="orders-table">
                <thead><tr><th>Symbol</th><th>Type</th><th>Side</th><th>Price</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="ordersList"><tr><td colspan="7" style="text-align:center;">No open orders</td></tr></tbody>
            </table>
        </div>
        <div id="historyTab" style="display:none;">
            <table class="orders-table">
                <thead><tr><th>Symbol</th><th>Side</th><th>Size</th><th>Price</th><th>Date</th><th>Status</th></tr></thead>
                <tbody id="historyList"><tr><td colspan="6" style="text-align:center;">No history</td></tr></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://eric-venture.onrender.com';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        let tvWidget = null;
        let currentSymbol = 'BTC';
        let currentPrice = 0;
        let orderType = 'limit';
        let currentInterval = '15';

        // Market data
        const markets = [
            { symbol: 'BTC', name: 'Bitcoin', price: 0, change: 0 },
            { symbol: 'ETH', name: 'Ethereum', price: 0, change: 0 },
            { symbol: 'BNB', name: 'BNB', price: 0, change: 0 },
            { symbol: 'SOL', name: 'Solana', price: 0, change: 0 },
            { symbol: 'XRP', name: 'Ripple', price: 0, change: 0 }
        ];

        // Initialize TradingView
        function initTradingView(symbol, interval) {
            if (tvWidget) tvWidget.remove();
            tvWidget = new TradingView.widget({
                container_id: "tradingview-widget",
                width: "100%",
                height: 380,
                symbol: `BINANCE:${symbol}USDT`,
                interval: interval,
                timezone: "Etc/UTC",
                theme: "dark",
                style: "1",
                locale: "en",
                enable_publishing: false,
                hide_side_toolbar: false,
                allow_symbol_change: true,
                studies: ["MASimple@tv-basicstudies"]
            });
        }

        // Fetch all market prices
        async function fetchAllPrices() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await res.json();
                
                for (let market of markets) {
                    const ticker = data.find(t => t.symbol === `${market.symbol}USDT`);
                    if (ticker) {
                        market.price = parseFloat(ticker.lastPrice);
                        market.change = parseFloat(ticker.priceChangePercent);
                    }
                }
                updateMarketList();
                
                // Update current symbol price
                const currentMarket = markets.find(m => m.symbol === currentSymbol);
                if (currentMarket) {
                    currentPrice = currentMarket.price;
                    document.getElementById('currentPrice').innerHTML = `$${currentPrice.toLocaleString()}`;
                    const change = currentMarket.change;
                    const changeElem = document.getElementById('currentChange');
                    changeElem.innerHTML = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                    changeElem.className = `current-change ${change >= 0 ? 'up' : 'down'}`;
                    document.getElementById('limitPrice').value = currentPrice;
                }
            } catch(e) { console.log(e); }
        }

        function updateMarketList() {
            const container = document.getElementById('marketList');
            container.innerHTML = markets.map(m => `
                <div class="market-item ${m.symbol === currentSymbol ? 'active' : ''}" onclick="changeSymbol('${m.symbol}')">
                    <span class="market-symbol">${m.symbol}/USDT</span>
                    <span class="market-price ${m.change >= 0 ? 'up' : 'down'}">$${m.price.toLocaleString()}</span>
                </div>
            `).join('');
        }

        function changeSymbol(symbol) {
            currentSymbol = symbol;
            initTradingView(symbol, currentInterval);
            fetchAllPrices();
            document.getElementById('currentSymbol').innerHTML = `${symbol}/USDT`;
        }

        function setOrderType(type) {
            orderType = type;
            document.querySelectorAll('.order-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('limitOrder').style.display = type === 'limit' ? 'block' : 'none';
            document.getElementById('marketOrder').style.display = type === 'market' ? 'block' : 'none';
            document.getElementById('stopOrder').style.display = type === 'stop' ? 'block' : 'none';
        }

        function placeOrder(side) {
            let amount = 0;
            let price = 0;
            
            if (orderType === 'limit') {
                amount = document.getElementById('limitAmount').value;
                price = document.getElementById('limitPrice').value;
            } else if (orderType === 'market') {
                amount = document.getElementById('marketAmount').value;
                price = currentPrice;
            } else {
                amount = document.getElementById('stopAmount').value;
                price = document.getElementById('stopPrice').value;
            }
            
            if (!amount || amount <= 0) {
                alert('Enter amount');
                return;
            }
            
            alert(`${side.toUpperCase()} order placed: ${amount} ${currentSymbol} at ${orderType === 'market' ? 'market' : '$' + price}`);
        }

        function showTab(tab) {
            document.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('positionsTab').style.display = tab === 'positions' ? 'block' : 'none';
            document.getElementById('ordersTab').style.display = tab === 'orders' ? 'block' : 'none';
            document.getElementById('historyTab').style.display = tab === 'history' ? 'block' : 'none';
        }

        // Timeframe switching
        document.querySelectorAll('.timeframe').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.timeframe').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentInterval = this.dataset.interval;
                initTradingView(currentSymbol, currentInterval);
            });
        });

        async function fetchBalances() {
            try {
                const res = await fetch(`${API_URL}/api/user/balance`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                const balance = data.totalUSD || 0;
                document.getElementById('balance').innerHTML = `$${balance.toFixed(2)}`;
                document.getElementById('freeMargin').innerHTML = `$${balance.toFixed(2)}`;
                document.getElementById('marginLevel').innerHTML = `100%`;
            } catch(e) { console.log(e); }
        }

        function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

        initTradingView('BTC', '15');
        fetchAllPrices();
        fetchBalances();
        setInterval(fetchAllPrices, 10000);
    </script>
</body>
</html>
