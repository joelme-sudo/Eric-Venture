<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Eric Venture</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0A0B0D;
            color: white;
            padding: 16px;
        }
        .navbar {
            background: rgba(10,11,13,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #2B2D33;
            position: sticky;
            top: 0;
            padding: 12px 16px;
            margin: -16px -16px 16px -16px;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F0B90B, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .nav-links a {
            color: #8A8D92;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .logout-btn {
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 8px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.8rem;
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 12px;
            padding: 12px;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #8A8D92;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #F0B90B;
        }
        .two-col {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .card {
            background: #1C1D22;
            border: 1px solid #2B2D33;
            border-radius: 12px;
            padding: 12px;
        }
        .price-section {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }
        .pair-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #F0B90B;
        }
        .pair-change {
            font-size: 0.9rem;
        }
        .pair-change.up { color: #0ECB81; }
        .pair-change.down { color: #F6465D; }
        .live-status {
            font-size: 0.7rem;
            color: #8A8D92;
            margin-top: 5px;
        }
        .timeframes {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }
        .timeframe {
            padding: 4px 12px;
            background: #141519;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .timeframe.active {
            background: #F0B90B;
            color: black;
        }
        .chart-container {
            width: 100%;
            height: 250px;
            position: relative;
            margin-top: 10px;
        }
        .trade-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .trade-tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: #141519;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .trade-tab.active {
            background: #F0B90B;
            color: black;
        }
        .input-group {
            margin-bottom: 12px;
        }
        .input-group label {
            font-size: 0.75rem;
            color: #8A8D92;
            display: block;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            background: #141519;
            border: 1px solid #2B2D33;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
        }
        .trade-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .buy-btn {
            background: #0ECB81;
            color: black;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .sell-btn {
            background: #F6465D;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .market-table {
            width: 100%;
            font-size: 0.8rem;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .market-table th, .market-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #2B2D33;
        }
        .market-table th {
            color: #8A8D92;
            font-weight: 500;
        }
        .positive { color: #0ECB81; }
        .negative { color: #F6465D; }
        .trade-btn {
            background: #F0B90B;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .ai-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .ai-input input {
            flex: 1;
            padding: 10px;
            background: #141519;
            border: 1px solid #2B2D33;
            border-radius: 8px;
            color: white;
        }
        .ai-input button {
            padding: 10px 20px;
            background: #F0B90B;
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: 600;
            cursor: pointer;
        }
        .ai-response {
            margin-top: 10px;
            padding: 10px;
            background: #141519;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .two-col { grid-template-columns: 1fr; }
            .nav-links { display: none; }
            .chart-container { height: 180px; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <div class="logo">ERIC VENTURE</div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="market-spot.html">Markets</a>
                <a href="convert.html">Convert</a>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Balance</div><div class="stat-value" id="totalBalance">$0.00</div></div>
        <div class="stat-card"><div class="stat-label">BTC</div><div class="stat-value" id="btcBalance">0.0000</div></div>
        <div class="stat-card"><div class="stat-label">ETH</div><div class="stat-value" id="ethBalance">0.0000</div></div>
        <div class="stat-card"><div class="stat-label">USDT</div><div class="stat-value" id="usdtBalance">0.00</div></div>
    </div>

    <div class="two-col">
        <div class="card">
            <div class="price-section">
                <span style="font-size:0.9rem;">BTC/USDT</span>
                <span class="pair-price" id="btcPrice">$0.00</span>
                <span class="pair-change" id="btcChange"></span>
            </div>
            <div class="live-status" id="liveStatus">Connecting to live data...</div>
            <div class="timeframes">
                <span class="timeframe active" data-interval="1">1H</span>
                <span class="timeframe" data-interval="24">1D</span>
                <span class="timeframe" data-interval="168">1W</span>
            </div>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="trade-tabs"><span class="trade-tab active">Limit</span><span class="trade-tab">Market</span></div>
            <div class="input-group"><label>Price (USDT)</label><input type="number" id="tradePrice" placeholder="0.00" value="68000"></div>
            <div class="input-group"><label>Amount (BTC)</label><input type="number" id="tradeAmount" placeholder="0.00" value="0.001"></div>
            <div class="input-group"><label>Total</label><input type="text" id="tradeTotal" readonly placeholder="0.00 USDT"></div>
            <div class="trade-buttons"><button class="buy-btn" onclick="placeOrder('buy')">Buy BTC</button><button class="sell-btn" onclick="placeOrder('sell')">Sell BTC</button></div>
        </div>
    </div>

    <div class="card">
        <h3 style="font-size:1rem; margin-bottom:8px;">Market Prices</h3>
        <table class="market-table"><thead><tr><th>Coin</th><th>Price</th><th>24h</th><th></th></tr></thead><tbody id="marketData"><tr><td colspan="4">Loading...</td></tr></tbody></table>
    </div>

    <div class="card">
        <h3 style="font-size:1rem; margin-bottom:8px;">🤖 AI Assistant</h3>
        <div class="ai-input"><input type="text" id="aiCommand" placeholder="Type a command... e.g., deposit 100 USD, show balance"><button onclick="sendAICommand()">Send</button></div>
        <div class="ai-response" id="aiResponse">Ready. Try "deposit 100 USD" or "balance"</div>
    </div>

    <script>
        const API_URL = 'https://eric-venture.onrender.com';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        let priceChart;
        let chartData = [];
        let currentPrice = 68000;
        let ws = null;

        // Initialize chart
        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'BTC/USDT',
                        data: [],
                        borderColor: '#F0B90B',
                        backgroundColor: 'rgba(240,185,11,0.1)',
                        borderWidth: 2,
                        fill: true,
                        pointRadius: 0,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#2B2D33' }, ticks: { color: '#8A8D92' } }, x: { ticks: { color: '#8A8D92' } } }
                }
            });
        }

        // Add price to chart
        function addPriceToChart(price) {
            chartData.push(price);
            if (chartData.length > 50) chartData.shift();
            priceChart.data.labels = chartData.map((_, i) => i);
            priceChart.data.datasets[0].data = [...chartData];
            priceChart.update();
        }

        // Connect Binance WebSocket
        function connectWebSocket() {
            try {
                ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
                
                ws.onopen = () => {
                    document.getElementById('liveStatus').innerHTML = '✅ Live data connected';
                    document.getElementById('liveStatus').style.color = '#0ECB81';
                };
                
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    const price = parseFloat(data.p);
                    currentPrice = price;
                    document.getElementById('btcPrice').innerHTML = `$${price.toLocaleString()}`;
                    document.getElementById('tradePrice').value = price.toFixed(2);
                    addPriceToChart(price);
                };
                
                ws.onerror = () => {
                    document.getElementById('liveStatus').innerHTML = '⚠️ WebSocket error, using REST API';
                    document.getElementById('liveStatus').style.color = '#F6465D';
                    useRestAPI();
                };
            } catch(e) {
                useRestAPI();
            }
        }

        // Fallback REST API
        function useRestAPI() {
            setInterval(async () => {
                try {
                    const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                    const data = await res.json();
                    const price = parseFloat(data.price);
                    currentPrice = price;
                    document.getElementById('btcPrice').innerHTML = `$${price.toLocaleString()}`;
                    document.getElementById('tradePrice').value = price.toFixed(2);
                    addPriceToChart(price);
                } catch(e) { console.log(e); }
            }, 5000);
        }

        // Fetch 24h change
        async function fetch24hChange() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
                const data = await res.json();
                const change = parseFloat(data.priceChangePercent).toFixed(2);
                const changeClass = change >= 0 ? 'up' : 'down';
                document.getElementById('btcChange').innerHTML = `${change >= 0 ? '+' : ''}${change}%`;
                document.getElementById('btcChange').className = `pair-change ${changeClass}`;
            } catch(e) { console.log(e); }
        }

        // Fetch user balances
        async function fetchBalances() {
            try {
                const res = await fetch(`${API_URL}/api/user/balance`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const data = await res.json();
                document.getElementById('totalBalance').innerHTML = `$${data.totalUSD?.toFixed(2) || '0.00'}`;
            } catch(e) { console.log(e); }
        }

        // Fetch market data
        async function fetchMarketData() {
            try {
                const res = await fetch(`${API_URL}/api/market/all`);
                const data = await res.json();
                document.getElementById('marketData').innerHTML = data.slice(0,6).map(c => `
                    <tr>
                        <td><strong>${c.symbol}</strong> ${c.name}</td>
                        <td>$${c.price?.toLocaleString() || '0'}</td>
                        <td class="${c.change >= 0 ? 'positive' : 'negative'}">${c.change >= 0 ? '+' : ''}${c.change?.toFixed(1) || '0'}%</td>
                        <td><button class="trade-btn" onclick="alert('Trade ${c.symbol}')">Trade</button></td>
                    </tr>
                `).join('');
            } catch(e) { console.log(e); }
        }

        // Calculate total
        function updateTotal() {
            const price = parseFloat(document.getElementById('tradePrice').value) || 0;
            const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
            document.getElementById('tradeTotal').value = (price * amount).toFixed(2) + ' USDT';
        }

        // Place order
        function placeOrder(type) {
            const amount = document.getElementById('tradeAmount').value;
            if (!amount || amount <= 0) { alert('Enter amount'); return; }
            alert(`${type.toUpperCase()} order: ${amount} BTC at $${currentPrice}`);
        }

        // AI Command
        async function sendAICommand() {
            const cmd = document.getElementById('aiCommand').value;
            if (!cmd) return;
            const resp = document.getElementById('aiResponse');
            resp.innerText = 'Processing...';
            try {
                const res = await fetch(`${API_URL}/api/user/command`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
                    body: JSON.stringify({ command: cmd }) 
                });
                const data = await res.json();
                resp.innerText = data.success ? `✅ ${data.message}` : `❌ ${data.message}`;
                if (data.success) fetchBalances();
            } catch(e) { resp.innerText = '❌ Connection error'; }
            document.getElementById('aiCommand').value = '';
        }

        // Timeframe switching (mock for now)
        document.querySelectorAll('.timeframe').forEach(tf => {
            tf.addEventListener('click', function() {
                document.querySelectorAll('.timeframe').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        document.getElementById('tradePrice').addEventListener('input', updateTotal);
        document.getElementById('tradeAmount').addEventListener('input', updateTotal);

        function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

        // Initialize
        initChart();
        connectWebSocket();
        fetch24hChange();
        fetchBalances();
        fetchMarketData();
        updateTotal();
    </script>
</body>
</html>
