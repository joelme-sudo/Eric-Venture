<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard – Eric Venture</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0A0B0D; color: white; padding: 12px; overflow-x: hidden; }
        
        /* 120fps Optimized */
        .navbar {
            background: rgba(10,11,13,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #2B2D33;
            position: sticky;
            top: 0;
            padding: 10px 12px;
            margin: -12px -12px 16px -12px;
            z-index: 100;
            transform: translateZ(0);
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, #F0B90B, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 16px; flex-wrap: wrap; }
        .nav-links a { color: #8A8D92; text-decoration: none; font-size: 0.8rem; }
        .logout-btn { background: #1C1D22; border: 1px solid #2B2D33; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 0.7rem; color: white; }
        
        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
        .stat-card { background: #1C1D22; border: 1px solid #2B2D33; border-radius: 12px; padding: 10px; }
        .stat-label { font-size: 0.6rem; color: #8A8D92; }
        .stat-value { font-size: 0.9rem; font-weight: 700; color: #F0B90B; }
        
        /* Price Bar */
        .price-bar { background: #1C1D22; border: 1px solid #2B2D33; border-radius: 12px; padding: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .price-big { font-size: 1.5rem; font-weight: 700; color: #F0B90B; }
        .price-change { font-size: 0.8rem; }
        .price-change.up { color: #0ECB81; }
        .price-change.down { color: #F6465D; }
        
        /* Chart */
        .chart-card { background: #1C1D22; border: 1px solid #2B2D33; border-radius: 12px; padding: 12px; margin-bottom: 16px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .coin-selector { display: flex; gap: 8px; flex-wrap: wrap; }
        .coin-btn { background: #141519; border: none; padding: 4px 12px; border-radius: 20px; color: #8A8D92; font-size: 0.7rem; cursor: pointer; }
        .coin-btn.active { background: #F0B90B; color: black; }
        .tradingview-widget { width: 100%; height: 400px; }
        
        /* 2 Column */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .trade-card, .market-card { background: #1C1D22; border: 1px solid #2B2D33; border-radius: 12px; padding: 12px; }
        .trade-card h3, .market-card h3 { font-size: 0.85rem; margin-bottom: 10px; }
        .input-group { margin-bottom: 10px; }
        .input-group label { font-size: 0.65rem; color: #8A8D92; display: block; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 8px; background: #141519; border: 1px solid #2B2D33; border-radius: 8px; color: white; font-size: 0.8rem; }
        .trade-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .buy-btn { background: #0ECB81; color: black; border: none; padding: 8px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .sell-btn { background: #F6465D; color: white; border: none; padding: 8px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        /* Market Table */
        .market-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        .market-table th, .market-table td { padding: 8px 4px; text-align: left; border-bottom: 1px solid #2B2D33; }
        .market-table th { color: #8A8D92; font-weight: 500; }
        .positive { color: #0ECB81; }
        .negative { color: #F6465D; }
        
        /* AI */
        .ai-card { background: #1C1D22; border: 1px solid #2B2D33; border-radius: 12px; padding: 12px; margin-top: 16px; }
        .ai-card h3 { font-size: 0.85rem; margin-bottom: 10px; }
        .ai-input { display: flex; gap: 8px; }
        .ai-input input { flex: 1; padding: 10px; background: #141519; border: 1px solid #2B2D33; border-radius: 8px; color: white; font-size: 0.8rem; }
        .ai-input button { padding: 10px 16px; background: #F0B90B; border: none; border-radius: 8px; color: black; font-weight: 600; cursor: pointer; }
        .ai-response { margin-top: 10px; padding: 10px; background: #141519; border-radius: 8px; font-size: 0.75rem; }
        
        /* Mobile */
        @media (max-width: 768px) {
            body { padding: 8px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .two-col { grid-template-columns: 1fr; gap: 12px; }
            .nav-links { display: none; }
            .price-big { font-size: 1.2rem; }
            .tradingview-widget { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <div class="logo">ERIC VENTURE</div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="wallets.html">Wallets</a>
                <a href="market-spot.html">Markets</a>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Total Balance</div><div class="stat-value" id="totalBalance">$0.00</div></div>
        <div class="stat-card"><div class="stat-label">BTC</div><div class="stat-value" id="btcBalance">0.0000</div></div>
        <div class="stat-card"><div class="stat-label">ETH</div><div class="stat-value" id="ethBalance">0.0000</div></div>
        <div class="stat-card"><div class="stat-label">USDT</div><div class="stat-value" id="usdtBalance">0.00</div></div>
    </div>

    <div class="price-bar">
        <div><span style="font-size:0.8rem;">BTC/USDT</span><div class="price-big" id="btcPrice">$0.00</div></div>
        <div class="price-change" id="btcChange"></div>
        <div><span style="font-size:0.65rem; color:#8A8D92;">24h Vol</span><div id="btcVolume">-</div></div>
    </div>

    <div class="chart-card">
        <div class="chart-header">
            <h3>Live Chart</h3>
            <div class="coin-selector">
                <button class="coin-btn active" onclick="changeSymbol('BTC')">BTC</button>
                <button class="coin-btn" onclick="changeSymbol('ETH')">ETH</button>
                <button class="coin-btn" onclick="changeSymbol('BNB')">BNB</button>
                <button class="coin-btn" onclick="changeSymbol('SOL')">SOL</button>
            </div>
        </div>
        <div id="tradingview-widget" class="tradingview-widget"></div>
    </div>

    <div class="two-col">
        <div class="trade-card">
            <h3>Trade BTC/USDT</h3>
            <div class="input-group"><label>Price (USDT)</label><input type="number" id="tradePrice" placeholder="0.00"></div>
            <div class="input-group"><label>Amount (BTC)</label><input type="number" id="tradeAmount" placeholder="0.00"></div>
            <div class="input-group"><label>Total</label><input type="text" id="tradeTotal" readonly placeholder="0.00 USDT"></div>
            <div class="trade-buttons"><button class="buy-btn" onclick="placeOrder('buy')">Buy</button><button class="sell-btn" onclick="placeOrder('sell')">Sell</button></div>
        </div>
        <div class="market-card">
            <h3>Market Prices</h3>
            <table class="market-table"><thead><tr><th>Coin</th><th>Price</th><th>24h</th></tr></thead><tbody id="marketData"><tr><td colspan="3">Loading...</td></tr></tbody></table>
        </div>
    </div>

    <div class="ai-card">
        <h3>🤖 AI Assistant</h3>
        <div class="ai-input">
            <input type="text" id="aiCommand" placeholder="deposit 100 USD, balance">
            <button onclick="sendAICommand()">Send</button>
        </div>
        <div class="ai-response" id="aiResponse">Ready. Try "deposit 100 USD"</div>
    </div>

    <script>
        const API_URL = 'https://eric-venture.onrender.com';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        let tvWidget = null;
        let currentSymbol = 'BTC';

        function initTradingView(symbol) {
            if (tvWidget) tvWidget.remove();
            tvWidget = new TradingView.widget({
                container_id: "tradingview-widget",
                width: "100%",
                height: 400,
                symbol: `BINANCE:${symbol}USDT`,
                interval: "60",
                timezone: "Etc/UTC",
                theme: "dark",
                style: "1",
                locale: "en",
                enable_publishing: false,
                hide_side_toolbar: false,
                allow_symbol_change: true,
                studies: ["MASimple@tv-basicstudies", "RSI@tv-basicstudies"]
            });
        }

        function changeSymbol(symbol) {
            currentSymbol = symbol;
            document.querySelectorAll('.coin-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            initTradingView(symbol);
            fetchPrice(symbol);
        }

        async function fetchPrice(symbol) {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}USDT`);
                const data = await res.json();
                document.getElementById('btcPrice').innerHTML = `$${parseFloat(data.lastPrice).toLocaleString()}`;
                const change = parseFloat(data.priceChangePercent).toFixed(2);
                document.getElementById('btcChange').innerHTML = `${change >= 0 ? '+' : ''}${change}%`;
                document.getElementById('btcChange').className = `price-change ${change >= 0 ? 'up' : 'down'}`;
                document.getElementById('btcVolume').innerHTML = `$${(parseFloat(data.quoteVolume) / 1e9).toFixed(2)}B`;
                document.getElementById('tradePrice').value = data.lastPrice;
            } catch(e) { console.log(e); }
        }

        async function fetchMarketPrices() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const allData = await res.json();
                const symbols = ['BTC', 'ETH', 'BNB', 'SOL'];
                const marketData = symbols.map(sym => {
                    const t = allData.find(t => t.symbol === `${sym}USDT`);
                    return t ? { symbol: sym, price: parseFloat(t.lastPrice), change: parseFloat(t.priceChangePercent) } : null;
                }).filter(m => m);
                document.getElementById('marketData').innerHTML = marketData.map(m => `
                    <tr onclick="changeSymbol('${m.symbol}')">
                        <td><strong>${m.symbol}</strong></td>
                        <td>$${m.price.toLocaleString()}</td>
                        <td class="${m.change >= 0 ? 'positive' : 'negative'}">${m.change >= 0 ? '+' : ''}${m.change.toFixed(2)}%</td>
                    </tr>
                `).join('');
            } catch(e) { console.log(e); }
        }

        async function fetchBalances() {
            try {
                const res = await fetch(`${API_URL}/api/user/balance`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                document.getElementById('totalBalance').innerHTML = `$${data.totalUSD?.toFixed(2) || '0.00'}`;
            } catch(e) { console.log(e); }
        }

        function updateTotal() {
            const price = parseFloat(document.getElementById('tradePrice').value) || 0;
            const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
            document.getElementById('tradeTotal').value = (price * amount).toFixed(2) + ' USDT';
        }

        function placeOrder(type) {
            const amount = document.getElementById('tradeAmount').value;
            if (!amount || amount <= 0) { alert('Enter amount'); return; }
            alert(`${type.toUpperCase()} order: ${amount} ${currentSymbol}`);
        }

        async function sendAICommand() {
            const cmd = document.getElementById('aiCommand').value;
            if (!cmd) return;
            const resp = document.getElementById('aiResponse');
            resp.innerText = 'Processing...';
            try {
                const res = await fetch(`${API_URL}/api/user/command`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ command: cmd }) });
                const data = await res.json();
                resp.innerText = data.success ? `✅ ${data.message}` : `❌ ${data.message}`;
                if (data.success) fetchBalances();
            } catch(e) { resp.innerText = '❌ Error'; }
            document.getElementById('aiCommand').value = '';
        }

        document.getElementById('tradePrice').addEventListener('input', updateTotal);
        document.getElementById('tradeAmount').addEventListener('input', updateTotal);

        function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

        initTradingView('BTC');
        fetchPrice('BTC');
        fetchMarketPrices();
        fetchBalances();
        setInterval(() => fetchPrice(currentSymbol), 30000);
        setInterval(fetchMarketPrices, 60000);
    </script>
</body>
</html>
