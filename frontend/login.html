<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Login – Eric Venture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at 30% 20%, #0F1622 0%, #0A0B0E 100%);
            color: #FFFFFF;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        
        .orb {
            position: fixed;
            top: -30%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }
        
        .orb2 {
            position: fixed;
            bottom: -20%;
            left: -30%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(240,185,11,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float2 15s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-5%, -5%) scale(1.05); }
        }
        
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 5%) scale(1.1); }
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            margin: 20px auto;
            padding: 16px;
            position: relative;
            z-index: 1;
        }
        
        /* Navigation */
        .navbar {
            background: rgba(28,29,34,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 20px;
            padding: 10px 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F0B90B, #3B82F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 20px;
        }
        .nav-links a {
            color: #8A8D92;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s ease;
        }
        .nav-links a:hover { color: #F0B90B; }
        
        /* Login Card */
        .login-card {
            background: rgba(28,29,34,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-header h1 span {
            background: linear-gradient(135deg, #F0B90B, #3B82F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-header p {
            color: #8A8D92;
            font-size: 0.9rem;
        }
        
        /* Features Row */
        .features-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .feature-chip {
            background: rgba(20,21,25,0.5);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            color: #8A8D92;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .feature-chip i { color: #0ECB81; font-size: 0.7rem; }
        
        /* Input Groups */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #8A8D92;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8A8D92;
            font-size: 1rem;
        }
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            background: rgba(20,21,25,0.5);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 16px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #F0B90B;
            background: rgba(20,21,25,0.8);
        }
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8A8D92;
            cursor: pointer;
        }
        
        /* Options Row */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #8A8D92;
        }
        .remember-me input {
            width: 16px;
            height: 16px;
            accent-color: #F0B90B;
        }
        .forgot-link {
            color: #F0B90B;
            text-decoration: none;
            font-size: 0.8rem;
        }
        
        /* Login Button */
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #F0B90B, #3B82F6);
            border: none;
            border-radius: 40px;
            padding: 14px;
            color: black;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            color: #8A8D92;
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(59,130,246,0.2);
        }
        
        /* Social Login */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .social-btn {
            background: rgba(20,21,25,0.5);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 40px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .social-btn:hover {
            border-color: #F0B90B;
            background: rgba(240,185,11,0.1);
        }
        
        /* Signup Link */
        .signup-link {
            text-align: center;
            color: #8A8D92;
            font-size: 0.85rem;
        }
        .signup-link a {
            color: #F0B90B;
            text-decoration: none;
            font-weight: 600;
        }
        
        /* Error Message */
        .error-message {
            background: rgba(246,70,93,0.15);
            border: 1px solid #F6465D;
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            text-align: center;
            font-size: 0.8rem;
            color: #F6465D;
            display: none;
        }
        
        /* Trust Badges */
        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .trust-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #8A8D92;
        }
        .trust-badge i { color: #0ECB81; }
        
        /* Mobile */
        @media (max-width: 480px) {
            .login-card { padding: 24px 20px; }
            .features-row { justify-content: center; }
            .social-login { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="orb"></div>
    <div class="orb2"></div>

    <div class="login-container">
        <!-- Navigation -->
        <div class="navbar">
            <div class="logo">ERIC VENTURE</div>
            <div class="nav-links">
                <a href="landing.html">Home</a>
                <a href="signup.html">Sign Up</a>
            </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <div class="login-header">
                <h1>Welcome <span>Back</span></h1>
                <p>Log in to your account</p>
            </div>

            <!-- Security Features -->
            <div class="features-row">
                <div class="feature-chip"><i class="fas fa-shield-alt"></i> 256-bit Encryption</div>
                <div class="feature-chip"><i class="fas fa-lock"></i> 2FA Security</div>
                <div class="feature-chip"><i class="fas fa-fingerprint"></i> Biometric Login</div>
            </div>

            <!-- Email -->
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="you@example.com" value="breakthrougheric981@gmail.com">
                </div>
            </div>

            <!-- Password -->
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" value="Rejoice12">
                    <button class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Options -->
            <div class="options-row">
                <label class="remember-me">
                    <input type="checkbox" id="remember"> Remember me
                </label>
                <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
            </div>

            <!-- Login Button -->
            <button class="login-btn" onclick="login()">Log In</button>

            <!-- Divider -->
            <div class="divider">or continue with</div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-btn" onclick="alert('Google login coming soon')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn" onclick="alert('Apple login coming soon')">
                    <i class="fab fa-apple"></i> Apple
                </button>
            </div>

            <!-- Signup Link -->
            <div class="signup-link">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message"></div>

            <!-- Trust Badges -->
            <div class="trust-badges">
                <div class="trust-badge"><i class="fas fa-check-circle"></i> 37M+ Users</div>
                <div class="trust-badge"><i class="fas fa-check-circle"></i> 24/7 Support</div>
                <div class="trust-badge"><i class="fas fa-check-circle"></i> Instant Withdrawals</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://eric-venture.onrender.com';

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('.password-toggle i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.querySelector('.login-btn');
            
            errorDiv.style.display = 'none';
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter both email and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    if (remember) {
                        localStorage.setItem('rememberedEmail', email);
                    }
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Invalid email or password';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Log In';
            }
        }
        
        // Load remembered email
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
            document.getElementById('email').value = rememberedEmail;
            document.getElementById('remember').checked = true;
        }
        
        // Enter key to submit
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
